dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - "backend/pyproject.toml"
          - "uv.lock"
          - "frontend/package.json"
          - "bun.lock"
          - ".github/dependabot.yml"
          - ".github/workflows/**"
          - "backend/Dockerfile"
          - "frontend/Dockerfile"

docs:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"

ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"

frontend:
  - changed-files:
      - any-glob-to-any-file:
          - "frontend/**"

backend:
  - changed-files:
      - any-glob-to-any-file:
          - "backend/**"

railway:
  - changed-files:
      - any-glob-to-any-file:
          - "railway*.json"
          - ".env.railway*.example"
          - "scripts/railway-bootstrap.sh"
          - "deployment.md"
          - "RAILWAY_QUICKSTART.md"
